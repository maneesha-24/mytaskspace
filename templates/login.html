<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — MyTask Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">

      <div class="brand">
        <div class="brand-icon">✦</div>
        <h1 class="brand-name">MyTask Space</h1>
        <p class="brand-sub">Your personal planning sanctuary</p>
      </div>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login" class="auth-form">
        <div class="field">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" name="password" id="pw" placeholder="Enter your password" required autocomplete="current-password"/>
            <button type="button" class="pw-toggle" onclick="togglePw('pw','eyePw')">
              <svg id="eyePw" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="/register">Create one — it's free</a>
      </div>

    </div>
  </div>
  <script>
    function togglePw(inputId, iconId) {
      const inp = document.getElementById(inputId);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Register — MyTask Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">

      <div class="brand">
        <div class="brand-icon">✦</div>
        <h1 class="brand-name">MyTask Space</h1>
        <p class="brand-sub">Create your free account</p>
      </div>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/register" class="auth-form">
        <div class="field">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>

        <div class="field">
          <label>Password <span class="hint">(min. 8 characters)</span></label>
          <div class="pw-wrap">
            <input type="password" name="password" id="pw1" placeholder="Create a strong password" required autocomplete="new-password" oninput="checkStrength(this.value)"/>
            <button type="button" class="pw-toggle" onclick="togglePw('pw1')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="strength-bar"><div id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" name="confirm" id="pw2" placeholder="Re-enter your password" required autocomplete="new-password"/>
            <button type="button" class="pw-toggle" onclick="togglePw('pw2')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="terms">
          By creating an account you agree that this is a portfolio project —
          do not store sensitive personal information.
        </div>

        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="/login">Sign in</a>
      </div>

    </div>
  </div>

  <script>
    function togglePw(id) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
    function checkStrength(val) {
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8)  score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        {w:'0%',   color:'#e0d8ce', text:''},
        {w:'25%',  color:'#C0392B', text:'Weak'},
        {w:'50%',  color:'#BF5A1A', text:'Fair'},
        {w:'75%',  color:'#9A7200', text:'Good'},
        {w:'100%', color:'#2E7D32', text:'Strong'},
      ];
      const lvl = levels[Math.min(score, 4)];
      fill.style.width = lvl.w;
      fill.style.background = lvl.color;
      label.textContent = lvl.text;
      label.style.color  = lvl.color;
    }
  </script>
</body>
</html>
